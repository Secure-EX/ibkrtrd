<style>
  body { overflow: hidden; }

    display: grid;

  }
  .left {
    display: flex; flex-direction: column;

    min-width: 0;

  .right {
    overflow-y: auto;
    background: var(--bg-1);

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
    min-height: 50px;
    scrollbar-width: thin;
    flex-wrap: nowrap;
    white-space: nowrap;
  }
  .toolbar::-webkit-scrollbar { height: 6px; }
  .toolbar label.lbl {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .toolbar .sep { width: 1px; height: 18px; background: var(--line); flex-shrink: 0; }
  .toolbar select { min-width: 200px; }

  /* Legend */
  .legend {
    display: flex; gap: 18px;
    padding: 8px 18px 6px;
    flex-wrap: wrap;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line-soft);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-2);
    flex-shrink: 0;
  }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend .swatch {
    width: 12px; height: 2px; border-radius: 1px;
  }
  .legend .swatch.box { height: 8px; width: 8px; border-radius: 2px; }

  /* Chart */
  .chart-area {
    flex: 1;
    position: relative;
    min-height: 320px;
    background: var(--bg-0);
  }
  #chart-canvas { display: block; width: 100%; height: 100%; }

  .crosshair-readout {
    position: absolute;
    top: 8px; left: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-1);
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    display: flex; gap: 14px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 3;

  .crosshair-readout span b { color: var(--fg-0); font-weight: 500; }
  .crosshair-readout .date { color: var(--fg-2); margin-right: 4px; }

  .chart-foot {
    padding: 8px 18px 10px;
    background: var(--bg-1);
    border-top: 1px solid var(--line);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-2);
    flex-shrink: 0;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .chart-foot .sep { color: var(--fg-3); }
  .chart-foot .right { margin-left: auto; }

  /* Trend panel below chart */
  .trend-panel {
    border-top: 1px solid var(--line);
    background: var(--bg-1);
    padding: 14px 18px 16px;
    flex-shrink: 0;
    max-height: 38vh;
    overflow-y: auto;

    font-family: var(--font-sans);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-2);
    margin: 0 0 10px;
    font-weight: 500;

  .trend-group { margin-bottom: 12px; }

    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg-2);
    margin-bottom: 6px;

  .badges { display: flex; flex-wrap: wrap; gap: 6px; }

    display: inline-flex; align-items: baseline; gap: 5px;

    border: 1px solid var(--line);
    border-radius: 3px;

  .badge.bear { border-color: rgba(239,91,91,0.35); background: var(--down-soft); }

<script>
/* Theme */
const THEME_KEY = 'apx-theme';
const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const themeBtn = document.getElementById('theme-toggle');
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.innerHTML = t === 'dark' ? sunIcon : moonIcon;
  localStorage.setItem(THEME_KEY, t);
  if (window.__redrawChart) window.__redrawChart();
}
setTheme(localStorage.getItem(THEME_KEY) || 'dark');
themeBtn.addEventListener('click', () => {
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

/* Data */
const DATA = JSON.parse(document.getElementById('app-data').textContent);
const params = new URLSearchParams(location.search);
const initial = params.get('ticker') && DATA.tickers.includes(params.get('ticker')) ? params.get('ticker') : DATA.current;

/* Ticker select */
const tickerSel = document.getElementById('ticker-select');
DATA.tickers.forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t;
  if (t === initial) o.selected = true;
  tickerSel.appendChild(o);
});
tickerSel.addEventListener('change', () => {
  loadTicker(tickerSel.value);
});

const state = { tf: 'daily', range: '1Y', mode: 'line', bb: true, ma: true, series: [], hover: -1, ticker: initial };

function loadTicker(t) {
  state.ticker = t;
  const pos = DATA.positions[t] || makeFallbackPosition(t);
  document.getElementById('report-title').textContent = `${t} ${pos.name} · 单股深度分析报告`;
  document.getElementById('report-source').textContent = `stage1_${t.replace('.','_')}_full.md`;
  const sign = pos.pnlPct >= 0 ? '+' : '−';
  const cls = pos.pnlPct >= 0 ? 'up' : 'down';
  document.getElementById('position-meta').innerHTML =
    `生成时间: <b>${pos.generated}</b> <span class="sep">|</span> ` +
    `当前价: <b>HKD ${pos.px.toFixed(2)}</b> <span class="sep">|</span> ` +
    `持仓: <b>${pos.qty} 股 @ 均价 HKD ${pos.cost.toFixed(2)}</b> <span class="sep">|</span> ` +
    `浮动盈亏 <b class="${cls}">HKD ${pos.pnl.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})} (${sign}${Math.abs(pos.pnlPct).toFixed(2)}%)</b> <span class="sep">|</span> ` +
    `占组合 ${pos.weight.toFixed(2)}%`;
  document.getElementById('report-body').innerHTML = pos.report_md || `<p class="muted">暂无 stage1 报告。</p>`;
  renderTrend(pos.trend || []);
  seedSeries(t + '|' + state.tf + '|' + state.range);
  redraw();
}

function makeFallbackPosition(t) {
  return {
    name: '—', generated: '2026-04-25',
    px: 100, qty: 0, cost: 100, pnl: 0, pnlPct: 0, weight: 0,
    trend: [{title:"无可用数据", badges:[{l:"状态",v:"暂无","tone":""}]}],
    report_md: `<p class="muted">暂无 <code>stage1_${t.replace('.','_')}_full.md</code> 报告。</p>`
  };
}

function renderTrend(groups) {
  const body = document.getElementById('trend-body');
  if (!groups.length) { body.innerHTML = '<p class="muted">暂无分析数据</p>'; return; }
  body.innerHTML = groups.map(g => `
    <div class="trend-group">
      <div class="gtitle">${g.title}</div>
      <div class="badges">
        ${g.badges.map(b => `<span class="badge ${b.tone||''}"><span class="l">${b.l}</span><span class="v">${b.v}</span></span>`).join('')}
      </div>
    </div>`).join('');
}

/* ─────────── Chart ─────────── */
function seededRng(seed) {
  let s = 0;
  for (let i=0;i<seed.length;i++) s = (s*31 + seed.charCodeAt(i)) >>> 0;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return ((s >>> 8) & 0xffffff) / 0xffffff; };
}
function seedSeries(seed) {
  const rng = seededRng(seed);
  const tfMul = ({daily:1, weekly:5, monthly:21})[state.tf] || 1;
  const rangeDays = ({'1Y':252,'3Y':252*3,'5Y':252*5,'ALL':252*7})[state.range] || 252;
  const points = Math.max(40, Math.floor(rangeDays / tfMul));
  let p = 280 + rng()*40;
  const arr = [];
  const start = new Date();
  start.setDate(start.getDate() - points * tfMul);
  let trend = 0.0008;
  for (let i=0;i<points;i++) {
    if (i % 30 === 0) trend = (rng()-0.42) * 0.003;
    const o = p;
    const drift = (rng()-0.5) * 0.04 + trend;
    const c = Math.max(60, p * (1 + drift));
    const h = Math.max(o,c) * (1 + rng()*0.018);
    const l = Math.min(o,c) * (1 - rng()*0.018);
    const v = Math.floor(8e6 + rng()*22e6 + Math.abs(c-o)/o * 4e7);
    const d = new Date(start.getTime() + i * tfMul * 86400000);
    arr.push({ d, o, h, l, c, v });
    p = c;
  }
  state.series = arr;
  document.getElementById('foot-last').textContent = arr[arr.length-1].c.toFixed(2);
  const tfLabel = ({daily:'日线',weekly:'周线',monthly:'月线'})[state.tf];
  const modeLabel = ({line:'折线',candle:'K 线'})[state.mode];
  document.getElementById('foot-mode').textContent = `${tfLabel} · ${arr.length} 个 K 棒 · 区间 ${state.range} · ${modeLabel}`;
  document.getElementById('trend-tf-label').textContent = tfLabel;
}

function sma(arr, n) {
  const out = new Array(arr.length).fill(null);
  let sum = 0;
  for (let i=0;i<arr.length;i++) {
    sum += arr[i].c;
    if (i >= n) sum -= arr[i-n].c;
    if (i >= n-1) out[i] = sum / n;
  }
  return out;
}
function bbands(arr, n=20, mult=2) {
  const ma = sma(arr,n);
  const up = new Array(arr.length).fill(null);
  const lo = new Array(arr.length).fill(null);
  for (let i=n-1;i<arr.length;i++) {
    let s = 0;
    for (let j=i-n+1;j<=i;j++) s += (arr[j].c - ma[i])**2;
    const sd = Math.sqrt(s/n);
    up[i] = ma[i] + mult*sd; lo[i] = ma[i] - mult*sd;
  }
  return {ma, up, lo};
}
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtNum(n, dp=2) { return n.toLocaleString('en-US',{minimumFractionDigits:dp, maximumFractionDigits:dp}); }
function fmtVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return String(v);
}

const cv = document.getElementById('chart-canvas');
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = cv.clientHeight;
  if (W <= 0 || H <= 0) return;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const padL = 8, padR = 60, padT = 12, padB = 22;
  const volH = Math.round(H * 0.18);
  const volGap = 8;
  const priceTop = padT;
  const priceBot = H - padB - volH - volGap;
  const priceH = priceBot - priceTop;
  const plotL = padL, plotR = W - padR;
  const plotW = plotR - plotL;

  const data = state.series;
  if (!data.length) return;

  let lo = Infinity, hi = -Infinity;
  data.forEach(d => { if (d.l < lo) lo = d.l; if (d.h > hi) hi = d.h; });
  const bb = bbands(data, 20, 2);
  if (state.bb) {
    bb.up.forEach(v => { if (v != null && v > hi) hi = v; });
    bb.lo.forEach(v => { if (v != null && v < lo) lo = v; });
  }
  const pad = (hi - lo) * 0.06;
  hi += pad; lo -= pad;

  const yPx = p => priceTop + (1 - (p - lo) / (hi - lo)) * priceH;
  const xStep = plotW / data.length;
  const xPx = i => plotL + (i + 0.5) * xStep;

  const C = {
    grid: cssVar('--grid'), line: cssVar('--line'),
    fg2: cssVar('--fg-2'), fg1: cssVar('--fg-1'), fg0: cssVar('--fg-0'),
    up: cssVar('--up'), down: cssVar('--down'),
    accent: cssVar('--accent'), info: cssVar('--info')
  };
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  // Grid + y labels
  ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  for (let i=0;i<=6;i++) {
    const p = lo + (hi-lo) * (i/6);
    const y = yPx(p);
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(plotL, y+0.5); ctx.lineTo(plotR, y+0.5); ctx.stroke();
    ctx.fillStyle = C.fg2;
    ctx.fillText(fmtNum(p, 0), plotR + 6, y);
  }

  // X grid (months)
  ctx.textAlign = 'center';
  let lastM = -1;
  for (let i=0;i<data.length;i++) {
    const m = data[i].d.getMonth();
    if (m !== lastM) {
      lastM = m;
      const x = xPx(i);
      ctx.strokeStyle = C.grid;
      ctx.beginPath(); ctx.moveTo(x+0.5, priceTop); ctx.lineTo(x+0.5, priceBot); ctx.stroke();
      ctx.fillStyle = C.fg2;
      const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      ctx.fillText(`${monNames[m]} ${data[i].d.getFullYear()}`, x, H - 8);
    }
  }

  // BB band
  if (state.bb) {
    ctx.beginPath();
    let started = false;
    for (let i=0;i<data.length;i++) {
      if (bb.up[i]==null) continue;
      const x = xPx(i), y = yPx(bb.up[i]);
      if (!started) { ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    }
    for (let i=data.length-1;i>=0;i--) {
      if (bb.lo[i]==null) continue;
      ctx.lineTo(xPx(i), yPx(bb.lo[i]));
    }
    ctx.closePath();
    ctx.fillStyle = isDark ? 'rgba(168,178,191,0.07)' : 'rgba(75,112,160,0.08)';
    ctx.fill();
    ctx.strokeStyle = isDark ? 'rgba(168,178,191,0.5)' : 'rgba(75,112,160,0.5)';
    ctx.lineWidth = 1;
    [bb.up, bb.lo].forEach(line => {
      ctx.beginPath();
      let s = false;
      line.forEach((v,i) => {
        if (v==null) return;
        const x = xPx(i), y = yPx(v);
        if (!s) { ctx.moveTo(x,y); s=true; } else ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
  }

  const cw = Math.max(1, xStep * 0.65);
  if (state.mode === 'candle') {
    data.forEach((d,i) => {
      const x = xPx(i);
      const isUp = d.c >= d.o;
      const col = isUp ? C.up : C.down;
      ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.round(x)+0.5, yPx(d.h));
      ctx.lineTo(Math.round(x)+0.5, yPx(d.l));
      ctx.stroke();
      const yo = yPx(d.o), yc = yPx(d.c);
      const top = Math.min(yo,yc), h = Math.max(1, Math.abs(yc-yo));
      ctx.fillRect(x - cw/2, top, cw, h);
    });
  } else {
    ctx.beginPath();
    data.forEach((d,i) => {
      const x = xPx(i), y = yPx(d.c);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle = C.info;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // MAs
  if (state.ma) {
    const m20 = sma(data,20), m60 = sma(data,60), m250 = sma(data, 250);
    [[m20, C.down],[m60, C.up],[m250, C.accent]].forEach(([line,color]) => {
      ctx.strokeStyle = color; ctx.lineWidth = 1.25;
      ctx.beginPath();
      let s = false;
      line.forEach((v,i)=>{
        if (v==null) return;
        const x = xPx(i), y = yPx(v);
        if (!s) { ctx.moveTo(x,y); s=true; } else ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
  }

  // Volume
  const volTop = priceBot + volGap;
  const volBot = H - padB;
  const vH = volBot - volTop;
  let vmax = 0; data.forEach(d => { if (d.v > vmax) vmax = d.v; });
  ctx.strokeStyle = C.line;
  ctx.beginPath(); ctx.moveTo(plotL, volTop+0.5); ctx.lineTo(plotR, volTop+0.5); ctx.stroke();
  data.forEach((d,i) => {
    const x = xPx(i);
    const h = (d.v / vmax) * vH * 0.92;
    const isUp = d.c >= d.o;
    ctx.fillStyle = isUp
      ? (isDark ? 'rgba(33,193,134,0.55)' : 'rgba(26,138,95,0.55)')
      : (isDark ? 'rgba(239,91,91,0.55)' : 'rgba(196,61,61,0.55)');
    ctx.fillRect(x - cw/2, volBot - h, cw, h);
  });
  ctx.fillStyle = C.fg2;
  ctx.font = '9.5px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('成交量', plotR + 6, volTop + 8);

  // Last price tag
  const last = data[data.length-1];
  const ly = yPx(last.c);
  const labelCol = last.c >= last.o ? C.up : C.down;
  ctx.fillStyle = labelCol;
  ctx.fillRect(plotR, ly-9, padR-2, 18);
  ctx.fillStyle = '#fff';
  ctx.font = '10.5px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(fmtNum(last.c, 2), plotR + (padR-2)/2, ly);

  // Crosshair
  if (state.hover >= 0 && state.hover < data.length) {
    const x = xPx(state.hover);
    ctx.strokeStyle = C.fg2;
    ctx.setLineDash([3,3]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.round(x)+0.5, priceTop);
    ctx.lineTo(Math.round(x)+0.5, H - padB);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Borders
  ctx.strokeStyle = C.line;
  ctx.lineWidth = 1;
  ctx.strokeRect(plotL+0.5, priceTop+0.5, plotW-1, priceH-1);
  ctx.strokeRect(plotL+0.5, volTop+0.5, plotW-1, (H-padB)-volTop-1);

  // Y axis label
  ctx.save();
  ctx.translate(2, (priceTop+priceBot)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = C.fg2;
  ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('价格', 0, 0);
  ctx.restore();

  cv.__layout = { plotL, plotR, plotW, priceTop, priceBot, xStep, data };
}
function redraw() { draw(); }
window.__redrawChart = redraw;
window.addEventListener('resize', () => requestAnimationFrame(redraw));

cv.addEventListener('mousemove', e => {
  const layout = cv.__layout; if (!layout) return;
  const rect = cv.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < layout.plotL || x > layout.plotR) {
    state.hover = -1;
    document.getElementById('crosshair').classList.remove('show');
    redraw();
    return;
  }
  const i = Math.max(0, Math.min(layout.data.length-1, Math.floor((x - layout.plotL) / layout.xStep)));
  if (i === state.hover) return;
  state.hover = i;
  const d = layout.data[i];
  const cr = document.getElementById('crosshair');
  cr.classList.add('show');
  document.getElementById('ch-date').textContent = fmtDate(d.d);
  document.getElementById('ch-o').textContent = fmtNum(d.o,2);
  document.getElementById('ch-h').textContent = fmtNum(d.h,2);
  document.getElementById('ch-l').textContent = fmtNum(d.l,2);
  const ce = document.getElementById('ch-c');
  ce.textContent = fmtNum(d.c,2);
  ce.style.color = d.c >= d.o ? cssVar('--up') : cssVar('--down');
  document.getElementById('ch-v').textContent = fmtVol(d.v);
  redraw();
});
cv.addEventListener('mouseleave', () => {
  state.hover = -1;
  document.getElementById('crosshair').classList.remove('show');
  redraw();
});

/* Toolbar wiring */
function bindSeg(id, key) {
  document.getElementById(id).addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#'+id+' button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state[key] = b.dataset[key];
    seedSeries(state.ticker + '|' + state.tf + '|' + state.range);
    redraw();
  });
}
bindSeg('tf-seg', 'tf');
bindSeg('range-seg', 'range');
bindSeg('mode-seg', 'mode');
document.getElementById('t-bb').addEventListener('change', e => { state.bb = e.target.checked; redraw(); });
document.getElementById('t-ma').addEventListener('change', e => { state.ma = e.target.checked; redraw(); });

/* Init */
loadTicker(initial);
requestAnimationFrame(redraw);
</script>
</body>
</html>
