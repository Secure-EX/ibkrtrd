{% extends "base.html" %}
{% block title %}报告 · HK Stock Webview{% endblock %}
{% block content %}
<div class="wrap">
  <section class="card">
    <div class="panel-head">
      <h2>📄 分析报告</h2>
      {% if files %}
        <form method="get" action="{{ url_for('reports') }}" style="display:inline-flex;gap:8px;align-items:center;">
          <select name="file" onchange="this.form.submit()">
            {% for f in files %}
              <option value="{{ f.name }}" {% if current and f.name == current.name %}selected{% endif %}>
                {{ parse_date(f.name) }} — {{ f.name }}
              </option>
            {% endfor %}
          </select>
          <noscript><button type="submit">查看</button></noscript>
        </form>
      {% endif %}
    </div>

    {% if not files %}
      <p class="empty">尚未生成任何报告。请先运行 <code>python -m llm_report.report_generator</code>。</p>
    {% else %}
      <article class="markdown-body">
        {{ html_body | safe }}
      </article>
    {% endif %}
  </section>
</div>
{% endblock %}
